name: Actualizar panel de licitaciones SOFAN

on:
  schedule:
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar index.html desde la API de Mercado Público
        env:
          MP_TICKET: ${{ secrets.MP_TICKET }}
        run: python build.py

      - name: Publicar cambios si los hay
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git add index.html
            git commit -m "Actualización automática del panel ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Sin cambios."
          fi
